<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
<title>Spotter V2</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #0a0a0a;
    color: #f0f0f0;
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  #app {
    width: 100%;
    max-width: 480px;
    padding: 12px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  h1 {
    font-size: 15px;
    font-weight: 500;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: #888;
    padding: 4px 0 0;
  }
  #viewfinder {
    width: 100%;
    aspect-ratio: 3/4;
    background: #111;
    border-radius: 16px;
    position: relative;
    overflow: hidden;
    border: 1px solid #222;
  }
  #camera-feed {
    width: 100%; height: 100%;
    object-fit: cover;
    display: block;
  }
  #no-camera {
    position: absolute; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    color: #555; gap: 10px; font-size: 14px;
  }
  #crosshair {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    pointer-events: none;
  }
  #overhead-bar {
    position: absolute; top: 12px; left: 12px; right: 12px;
    background: rgba(0,0,0,0.7);
    border-radius: 10px;
    padding: 8px 14px;
    font-size: 13px;
    color: #ddd;
    display: none;
  }
  #overhead-bar.visible { display: block; }
  #overhead-count { font-weight: 600; color: #fff; }
  #gps-badge {
    position: absolute; bottom: 104px; left: 50%; transform: translateX(-50%);
    background: rgba(0,0,0,0.65);
    color: #aaa;
    font-size: 11px;
    padding: 4px 12px;
    border-radius: 20px;
    white-space: nowrap;
    display: none;
  }
  #gps-badge.visible { display: block; }
  #catch-btn {
    position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
    width: 72px; height: 72px;
    border-radius: 50%;
    background: rgba(255,255,255,0.12);
    border: 3px solid rgba(255,255,255,0.9);
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: transform 0.1s, background 0.1s;
    -webkit-tap-highlight-color: transparent;
  }
  #catch-btn:active { transform: translateX(-50%) scale(0.91); background: rgba(255,255,255,0.3); }
  #catch-btn-inner {
    width: 54px; height: 54px;
    border-radius: 50%;
    background: #fff;
  }
  #status-bar {
    padding: 10px 14px;
    background: #161616;
    border-radius: 10px;
    font-size: 13px;
    color: #888;
    min-height: 42px;
    display: flex; align-items: center; gap: 8px;
    border: 1px solid #222;
  }
  .dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: #555; flex-shrink: 0;
  }
  .dot.green  { background: #4ade80; animation: pulse 2s infinite; }
  .dot.yellow { background: #facc15; animation: pulse 2s infinite; }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }
  #card-area { display: flex; flex-direction: column; gap: 10px; }
  .flight-card {
    background: #161616;
    border: 1px solid #2a2a2a;
    border-radius: 16px;
    padding: 16px 18px;
    animation: slideIn 0.3s ease;
  }
  @keyframes slideIn {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .card-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 14px;
  }
  .callsign {
    font-size: 22px; font-weight: 600;
    color: #fff; letter-spacing: 0.04em;
  }
  .caught-badge {
    background: #1a3a1a;
    color: #4ade80;
    font-size: 11px; font-weight: 600;
    padding: 4px 11px; border-radius: 20px;
    letter-spacing: 0.04em;
  }
  .card-row {
    display: flex; justify-content: space-between; align-items: center;
    font-size: 13px; padding: 6px 0;
    border-bottom: 1px solid #222;
  }
  .card-row:last-child { border-bottom: none; }
  .card-label { color: #666; }
  .card-value { font-weight: 500; color: #ddd; text-align: right; max-width: 65%; }
  #start-btn {
    width: 100%; padding: 15px;
    font-size: 16px; font-weight: 600;
    border-radius: 12px;
    background: #fff;
    color: #000;
    border: none; cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }
  #start-btn:active { opacity: 0.85; }
  footer { padding: 16px; font-size: 11px; color: #444; text-align: center; }
</style>
</head>
<body>
<div id="app">
  <h1>Spotter V2</h1>

  <div id="viewfinder">
    <video id="camera-feed" autoplay playsinline muted></video>
    <div id="no-camera">
      <svg width="36" height="36" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
        <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/>
        <circle cx="12" cy="13" r="4"/>
      </svg>
      <span>Camera not started</span>
    </div>
    <div id="crosshair">
      <svg width="84" height="84" viewBox="0 0 84 84" fill="none">
        <circle cx="42" cy="42" r="19" stroke="white" stroke-width="1.5" opacity="0.75"/>
        <line x1="42" y1="5"  x2="42" y2="23" stroke="white" stroke-width="1.5" opacity="0.75"/>
        <line x1="42" y1="61" x2="42" y2="79" stroke="white" stroke-width="1.5" opacity="0.75"/>
        <line x1="5"  y1="42" x2="23" y2="42" stroke="white" stroke-width="1.5" opacity="0.75"/>
        <line x1="61" y1="42" x2="79" y2="42" stroke="white" stroke-width="1.5" opacity="0.75"/>
        <circle cx="42" cy="42" r="2" fill="white" opacity="0.6"/>
      </svg>
    </div>
    <div id="overhead-bar">
      <span id="overhead-count">0 aircraft</span> overhead
    </div>
    <div id="gps-badge"></div>
    <div id="catch-btn" role="button" aria-label="Catch aircraft" tabindex="0">
      <div id="catch-btn-inner"></div>
    </div>
  </div>

  <div id="status-bar">
    <div class="dot" id="status-dot"></div>
    <span id="status-text">Tap Start to enable camera and GPS</span>
  </div>

  <div id="card-area"></div>

  <button id="start-btn" onclick="startApp()">Start spotting</button>
</div>

<footer>Powered by adsb.lol · spotter_v2</footer>

<script>
let stream = null;
let userLat = null;
let userLon = null;
let overheadFlights = [];
let gpsWatcher = null;
let pollInterval = null;
let started = false;
let catching = false;

const video         = document.getElementById('camera-feed');
const noCamera      = document.getElementById('no-camera');
const statusText    = document.getElementById('status-text');
const statusDot     = document.getElementById('status-dot');
const overheadBar   = document.getElementById('overhead-bar');
const overheadCount = document.getElementById('overhead-count');
const gpsBadge      = document.getElementById('gps-badge');
const cardArea      = document.getElementById('card-area');
const catchBtn      = document.getElementById('catch-btn');

function setStatus(msg, color) {
  statusText.textContent = msg;
  statusDot.className = 'dot' + (color ? ' ' + color : '');
}

async function startApp() {
  if (started) return;
  started = true;
  document.getElementById('start-btn').style.display = 'none';

  setStatus('Requesting camera access...');
  try {
    stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: { ideal: 'environment' } },
      audio: false
    });
    video.srcObject = stream;
    noCamera.style.display = 'none';
    setStatus('Camera active — getting GPS...');
  } catch(e) {
    setStatus('Camera denied — GPS-only mode.');
  }

  if (!navigator.geolocation) {
    setStatus('GPS unavailable on this device.');
    return;
  }

  gpsWatcher = navigator.geolocation.watchPosition(
    pos => {
      userLat = pos.coords.latitude;
      userLon = pos.coords.longitude;
      gpsBadge.textContent = userLat.toFixed(4) + ', ' + userLon.toFixed(4);
      gpsBadge.classList.add('visible');
      if (!pollInterval) {
        fetchFlights();
        pollInterval = setInterval(fetchFlights, 20000);
      }
    },
    err => setStatus('GPS error: ' + err.message),
    { enableHighAccuracy: true, maximumAge: 5000 }
  );
}

async function fetchFlights() {
  if (userLat === null) return;
  setStatus('Scanning overhead traffic...', 'yellow');

  const lat    = userLat.toFixed(4);
  const lon    = userLon.toFixed(4);
  const radius = 25;
  const url    = `https://api.adsb.lol/v2/lat/${lat}/lon/${lon}/dist/${radius}`;

  try {
    const res = await fetch(url);
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();
    overheadFlights = data.ac || [];
    const count = overheadFlights.length;
    overheadCount.textContent = count + ' aircraft';
    overheadBar.classList.add('visible');
    setStatus(
      count > 0 ? count + ' aircraft overhead — aim and catch!' : 'No aircraft detected right now.',
      count > 0 ? 'green' : ''
    );
  } catch(e) {
    setStatus('Could not reach adsb.lol: ' + e.message);
  }
}

function bestMatch() {
  if (!overheadFlights.length) return null;
  let best = null, bestDist = Infinity;
  for (const ac of overheadFlights) {
    const flat = parseFloat(ac.lat);
    const flon = parseFloat(ac.lon);
    if (isNaN(flat) || isNaN(flon)) continue;
    const d = Math.hypot(flat - userLat, flon - userLon);
    if (d < bestDist) { bestDist = d; best = ac; }
  }
  return best;
}

function fmt(val, suffix) {
  if (val === null || val === undefined || val === '' || val === '0' || val === 0) return '—';
  return val + (suffix || '');
}

function renderCard(ac) {
  const callsign = (ac.flight || ac.r || 'UNKNOWN').trim();
  const type     = fmt(ac.t);
  const reg      = fmt(ac.r);
  const altRaw   = ac.alt_baro;
  const alt      = altRaw ? parseInt(altRaw).toLocaleString() + ' ft' : (ac.gnd === '1' ? 'On ground' : '—');
  const spd      = ac.gs ? Math.round(ac.gs) + ' kts' : '—';
  const heading  = ac.track ? Math.round(ac.track) + '°' : '—';
  const squawk   = fmt(ac.squawk);
  const origin   = fmt(ac.orig);
  const dest     = fmt(ac.dest);
  const operator = fmt(ac.ownOp || ac.op);
  const icao     = (ac.hex || '—').toUpperCase();

  const card = document.createElement('div');
  card.className = 'flight-card';
  card.innerHTML = `
    <div class="card-header">
      <span class="callsign">${callsign}</span>
      <span class="caught-badge">CAUGHT</span>
    </div>
    <div class="card-row"><span class="card-label">Aircraft type</span><span class="card-value">${type}</span></div>
    <div class="card-row"><span class="card-label">Registration</span><span class="card-value">${reg}</span></div>
    <div class="card-row"><span class="card-label">Operator</span><span class="card-value">${operator}</span></div>
    <div class="card-row"><span class="card-label">Origin</span><span class="card-value">${origin}</span></div>
    <div class="card-row"><span class="card-label">Destination</span><span class="card-value">${dest}</span></div>
    <div class="card-row"><span class="card-label">Altitude</span><span class="card-value">${alt}</span></div>
    <div class="card-row"><span class="card-label">Speed</span><span class="card-value">${spd}</span></div>
    <div class="card-row"><span class="card-label">Heading</span><span class="card-value">${heading}</span></div>
    <div class="card-row"><span class="card-label">Squawk</span><span class="card-value">${squawk}</span></div>
    <div class="card-row"><span class="card-label">ICAO 24</span><span class="card-value">${icao}</span></div>
    <div class="card-row"><span class="card-label">Caught</span><span class="card-value">${new Date().toLocaleTimeString()}</span></div>
  `;
  cardArea.insertBefore(card, cardArea.firstChild);
}

catchBtn.addEventListener('click', async () => {
  if (catching) return;
  if (!userLat) { setStatus('Waiting for GPS fix...'); return; }
  catching = true;
  if (!overheadFlights.length) await fetchFlights();
  const match = bestMatch();
  if (!match) {
    setStatus('No matchable aircraft — try again.');
  } else {
    renderCard(match);
    setStatus('Caught! Card saved below.', 'green');
  }
  catching = false;
});

catchBtn.addEventListener('keydown', e => {
  if (e.key === 'Enter' || e.key === ' ') catchBtn.click();
});
</script>
</body>
</html>
