<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>Spotter V1.6</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  height: 100%;
  overflow: hidden;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: #0a0a0a;
  color: #f0f0f0;
}

/* ── SHELL ── */
#shell {
  display: flex;
  flex-direction: column;
  height: 100dvh;
  max-width: 480px;
  margin: 0 auto;
  overflow: hidden;
}

/* ── TOP BAR ── */
#topbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 16px 8px;
  flex-shrink: 0;
}
#topbar h1 {
  font-size: 15px; font-weight: 500;
  letter-spacing: 0.08em; text-transform: uppercase;
  color: #888;
}
.version-badge {
  font-size: 11px; font-weight: 600;
  background: #1a1a1a; border: 1px solid #333;
  color: #555; padding: 3px 10px;
  border-radius: 20px; letter-spacing: 0.06em;
}

/* ── CONTENT AREA ── */
#content {
  flex: 1;
  overflow: hidden;
  position: relative;
}

.tab-view {
  display: none;
  height: 100%;
  overflow: hidden;
}
.tab-view.active { display: flex; flex-direction: column; }

/* ── SPOT TAB ── */
#viewfinder {
  flex: 1;
  position: relative;
  overflow: hidden;
  background: #000;
}
#camera-feed {
  width: 100%; height: 100%;
  object-fit: cover;
  display: block;
}
#no-camera {
  position: absolute; inset: 0;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  color: #555; gap: 10px; font-size: 14px;
}
#crosshair {
  position: absolute; inset: 0;
  display: flex; align-items: center; justify-content: center;
  pointer-events: none;
}
#overhead-bar {
  position: absolute; top: 12px; left: 12px; right: 12px;
  background: rgba(0,0,0,0.72);
  border-radius: 10px;
  padding: 8px 14px;
  font-size: 13px; color: #ddd;
  display: none;
}
#overhead-bar.visible { display: block; }
#overhead-count { font-weight: 700; color: #fff; }
#gps-badge {
  position: absolute; bottom: 96px; left: 50%; transform: translateX(-50%);
  background: rgba(0,0,0,0.65);
  color: #aaa; font-size: 11px;
  padding: 4px 12px; border-radius: 20px;
  white-space: nowrap; display: none;
}
#gps-badge.visible { display: block; }
#catch-btn {
  position: absolute; bottom: 16px; left: 50%; transform: translateX(-50%);
  width: 72px; height: 72px; border-radius: 50%;
  background: rgba(255,255,255,0.12);
  border: 3px solid rgba(255,255,255,0.9);
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: transform 0.1s, background 0.1s;
  -webkit-tap-highlight-color: transparent;
}
#catch-btn:active { transform: translateX(-50%) scale(0.91); background: rgba(255,255,255,0.28); }
#catch-btn.cooldown { border-color: rgba(255,255,255,0.25); pointer-events: none; }
#catch-btn-inner {
  width: 54px; height: 54px; border-radius: 50%;
  background: #fff; transition: background 0.2s;
}
#catch-btn.cooldown #catch-btn-inner { background: #555; }
#spot-status {
  padding: 8px 14px;
  font-size: 12px; color: #666;
  text-align: center;
  flex-shrink: 0;
  background: #0a0a0a;
}
#start-btn {
  position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
  padding: 14px 40px;
  font-size: 16px; font-weight: 600;
  border-radius: 12px; background: #fff; color: #000;
  border: none; cursor: pointer;
  -webkit-tap-highlight-color: transparent;
  white-space: nowrap;
}

/* ── VERIFY TAB ── */
#verify-view {
  flex: 1;
  overflow-y: auto;
  padding: 16px;
  display: flex;
  flex-direction: column;
  gap: 12px;
}
#verify-empty {
  flex: 1;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  color: #444; font-size: 14px; gap: 8px;
  text-align: center; padding: 40px;
}
#verify-empty svg { opacity: 0.2; }
.verify-card {
  background: #161616;
  border: 1px solid #2a2a2a;
  border-radius: 16px;
  padding: 16px 18px;
  animation: slideIn 0.25s ease;
}
@keyframes slideIn {
  from { opacity: 0; transform: translateY(8px); }
  to   { opacity: 1; transform: translateY(0); }
}
.verify-callsign {
  font-size: 26px; font-weight: 700;
  color: #fff; letter-spacing: 0.04em;
  margin-bottom: 4px;
}
.verify-subtitle {
  font-size: 13px; color: #666; margin-bottom: 14px;
}
.card-row {
  display: flex; justify-content: space-between; align-items: center;
  font-size: 13px; padding: 6px 0;
  border-bottom: 1px solid #1e1e1e;
}
.card-row:last-child { border-bottom: none; }
.card-label { color: #555; }
.card-value { font-weight: 500; color: #ddd; text-align: right; max-width: 65%; }
.confidence-bar {
  background: #111;
  border: 1px solid #222;
  border-radius: 12px;
  padding: 12px 16px;
  display: flex; align-items: center; gap: 12px;
}
.conf-dot {
  width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0;
}
.conf-dot.high   { background: #4ade80; }
.conf-dot.medium { background: #facc15; }
.conf-dot.low    { background: #f87171; }
.conf-label { font-size: 13px; color: #888; }
.conf-label strong { color: #ddd; }
.verify-actions {
  display: flex; gap: 10px;
}
.btn-confirm {
  flex: 1; padding: 14px;
  font-size: 15px; font-weight: 600;
  border-radius: 12px;
  background: #1a3a1a; color: #4ade80;
  border: 1px solid #2a5a2a;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
}
.btn-confirm:active { opacity: 0.8; }
.btn-dismiss {
  flex: 1; padding: 14px;
  font-size: 15px; font-weight: 600;
  border-radius: 12px;
  background: #1a1a1a; color: #666;
  border: 1px solid #2a2a2a;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
}
.btn-dismiss:active { opacity: 0.8; }

/* ── LOG TAB ── */
#log-view {
  flex: 1;
  overflow-y: auto;
  padding: 16px;
  display: flex;
  flex-direction: column;
  gap: 10px;
}
#log-empty {
  flex: 1;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  color: #444; font-size: 14px; gap: 8px;
  text-align: center; padding: 40px;
}
#log-empty svg { opacity: 0.2; }
.log-card {
  background: #161616;
  border: 1px solid #2a2a2a;
  border-radius: 14px;
  padding: 14px 16px;
}
.log-card-header {
  display: flex; justify-content: space-between; align-items: center;
  margin-bottom: 6px;
}
.log-callsign {
  font-size: 18px; font-weight: 600; color: #fff;
  letter-spacing: 0.04em;
}
.log-time { font-size: 11px; color: #444; }
.log-meta {
  font-size: 12px; color: #666;
  display: flex; gap: 8px; flex-wrap: wrap;
  align-items: center;
}
.log-meta .conf-pill {
  font-size: 10px; font-weight: 700;
  padding: 2px 8px; border-radius: 10px;
  letter-spacing: 0.04em;
}
.conf-pill.high   { background: #1a3a1a; color: #4ade80; }
.conf-pill.medium { background: #3a3010; color: #facc15; }
.conf-pill.low    { background: #3a1a1a; color: #f87171; }
#log-clear-btn {
  flex-shrink: 0;
  padding: 12px;
  font-size: 13px; font-weight: 600;
  border-radius: 10px;
  background: #1a1a1a; color: #e55;
  border: 1px solid #3a2020;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
  margin-bottom: 8px;
}

/* ── TAB BAR ── */
#tabbar {
  display: flex;
  background: #111;
  border-top: 1px solid #1e1e1e;
  flex-shrink: 0;
}
.tab-btn {
  flex: 1;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 4px;
  padding: 10px 0 12px;
  background: none; border: none;
  color: #555; font-size: 10px;
  letter-spacing: 0.06em; text-transform: uppercase;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
  position: relative;
  transition: color 0.15s;
}
.tab-btn.active { color: #fff; }
.tab-btn svg { width: 22px; height: 22px; }
.tab-badge {
  position: absolute; top: 8px; right: calc(50% - 20px);
  background: #4ade80; color: #000;
  font-size: 9px; font-weight: 800;
  padding: 1px 5px; border-radius: 8px;
  display: none;
}
.tab-badge.visible { display: block; }

/* ── DOTS ── */
.dot {
  width: 7px; height: 7px; border-radius: 50%;
  background: #555; display: inline-block;
}
.dot.green  { background: #4ade80; animation: pulse 2s infinite; }
.dot.yellow { background: #facc15; animation: pulse 2s infinite; }
@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.3; }
}
</style>
</head>
<body>
<div id="shell">

  <!-- TOP BAR -->
  <div id="topbar">
    <h1>Spotter</h1>
    <span class="version-badge">V1.6</span>
  </div>

  <!-- CONTENT -->
  <div id="content">

    <!-- SPOT -->
    <div id="tab-spot" class="tab-view active">
      <div id="viewfinder">
        <video id="camera-feed" autoplay playsinline muted></video>
        <div id="no-camera">
          <svg width="36" height="36" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
            <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/>
            <circle cx="12" cy="13" r="4"/>
          </svg>
          <span>Camera not started</span>
        </div>
        <div id="crosshair">
          <svg width="84" height="84" viewBox="0 0 84 84" fill="none">
            <circle cx="42" cy="42" r="19" stroke="white" stroke-width="1.5" opacity="0.75"/>
            <line x1="42" y1="5"  x2="42" y2="23" stroke="white" stroke-width="1.5" opacity="0.75"/>
            <line x1="42" y1="61" x2="42" y2="79" stroke="white" stroke-width="1.5" opacity="0.75"/>
            <line x1="5"  y1="42" x2="23" y2="42" stroke="white" stroke-width="1.5" opacity="0.75"/>
            <line x1="61" y1="42" x2="79" y2="42" stroke="white" stroke-width="1.5" opacity="0.75"/>
            <circle cx="42" cy="42" r="2" fill="white" opacity="0.6"/>
          </svg>
        </div>
        <div id="overhead-bar"><span id="overhead-count">0 aircraft</span> overhead</div>
        <div id="gps-badge"></div>
        <div id="catch-btn" role="button" aria-label="Catch aircraft" tabindex="0">
          <div id="catch-btn-inner"></div>
        </div>
        <button id="start-btn" onclick="startApp()">Start spotting</button>
      </div>
      <div id="spot-status">
        <span class="dot" id="status-dot"></span>
        <span id="status-text" style="margin-left:6px;">Tap Start to enable camera and GPS</span>
      </div>
    </div>

    <!-- VERIFY -->
    <div id="tab-verify" class="tab-view">
      <div id="verify-view">
        <div id="verify-empty">
          <svg width="48" height="48" fill="none" stroke="currentColor" stroke-width="1.2" viewBox="0 0 24 24">
            <path d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/>
          </svg>
          <span>Nothing to verify yet.<br>Catch a flight first.</span>
        </div>
      </div>
    </div>

    <!-- LOG -->
    <div id="tab-log" class="tab-view">
      <div id="log-view">
        <div id="log-empty">
          <svg width="48" height="48" fill="none" stroke="currentColor" stroke-width="1.2" viewBox="0 0 24 24">
            <path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/>
          </svg>
          <span>No confirmed catches yet.</span>
        </div>
      </div>
    </div>

  </div>

  <!-- TAB BAR -->
  <div id="tabbar">
    <button class="tab-btn active" id="tabbtn-spot" onclick="switchTab('spot')">
      <svg fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
        <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/>
        <circle cx="12" cy="13" r="4"/>
      </svg>
      Spot
    </button>
    <button class="tab-btn" id="tabbtn-verify" onclick="switchTab('verify')">
      <svg fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
        <path d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/>
      </svg>
      Verify
      <span class="tab-badge" id="verify-badge"></span>
    </button>
    <button class="tab-btn" id="tabbtn-log" onclick="switchTab('log')">
      <svg fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
        <path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/>
      </svg>
      Log
      <span class="tab-badge" id="log-badge"></span>
    </button>
  </div>

</div>
<script>
/* ── STATE ── */
let stream = null, userLat = null, userLon = null;
let overheadFlights = [], gpsWatcher = null, pollInterval = null;
let started = false, catching = false;
let pendingVerify = null;
const COOLDOWN_MS = 30000;
const recentCatches = {};

/* ── ELEMENTS ── */
const video        = document.getElementById('camera-feed');
const noCamera     = document.getElementById('no-camera');
const statusText   = document.getElementById('status-text');
const statusDot    = document.getElementById('status-dot');
const overheadBar  = document.getElementById('overhead-bar');
const overheadCount= document.getElementById('overhead-count');
const gpsBadge     = document.getElementById('gps-badge');
const catchBtn     = document.getElementById('catch-btn');
const verifyBadge  = document.getElementById('verify-badge');
const logBadge     = document.getElementById('log-badge');

/* ── TABS ── */
function switchTab(name) {
  document.querySelectorAll('.tab-view').forEach(v => v.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-' + name).classList.add('active');
  document.getElementById('tabbtn-' + name).classList.add('active');
  if (name === 'verify') renderVerifyTab();
  if (name === 'log') renderLogTab();
}

/* ── STATUS ── */
function setStatus(msg, color) {
  statusText.textContent = msg;
  statusDot.className = 'dot' + (color ? ' ' + color : '');
}

/* ── STORAGE ── */
function loadCatches() {
  try { return JSON.parse(localStorage.getItem('spotter_catches') || '[]'); }
  catch(e) { return []; }
}
function saveCatches(arr) { localStorage.setItem('spotter_catches', JSON.stringify(arr)); }

function updateBadges() {
  const n = loadCatches().length;
  logBadge.textContent = n;
  logBadge.className = 'tab-badge' + (n > 0 ? ' visible' : '');
  verifyBadge.textContent = pendingVerify ? '!' : '';
  verifyBadge.className = 'tab-badge' + (pendingVerify ? ' visible' : '');
}

/* ── CAMERA / GPS ── */
async function startApp() {
  if (started) return;
  started = true;
  document.getElementById('start-btn').style.display = 'none';
  setStatus('Requesting camera...');
  try {
    stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: { ideal: 'environment' } }, audio: false
    });
    video.srcObject = stream;
    video.play().catch(() => {});
    noCamera.style.display = 'none';
    setStatus('Camera active — getting GPS...');
  } catch(e) { setStatus('Camera denied — GPS-only mode.'); }

  if (!navigator.geolocation) { setStatus('GPS unavailable.'); return; }
  gpsWatcher = navigator.geolocation.watchPosition(pos => {
    userLat = pos.coords.latitude;
    userLon = pos.coords.longitude;
    gpsBadge.textContent = userLat.toFixed(4) + ', ' + userLon.toFixed(4);
    gpsBadge.classList.add('visible');
    if (!pollInterval) { fetchFlights(); pollInterval = setInterval(fetchFlights, 20000); }
  }, err => setStatus('GPS error: ' + err.message), { enableHighAccuracy: true, maximumAge: 5000 });
}

/* ── FETCH FLIGHTS ── */
async function fetchFlights() {
  if (userLat === null) return;
  const lat = userLat.toFixed(4), lon = userLon.toFixed(4), r = 25;
  const api = `https://api.adsb.lol/v2/lat/${lat}/lon/${lon}/dist/${r}`;
  const url = `https://api.cors.lol/?url=${encodeURIComponent(api)}`;
  try {
    const res = await fetch(url);
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();
    overheadFlights = data.ac || [];
    const count = overheadFlights.length;
    overheadCount.textContent = count + ' aircraft';
    overheadBar.classList.add('visible');
    setStatus(count > 0 ? count + ' aircraft overhead — aim and catch!' : 'No aircraft detected.', count > 0 ? 'green' : '');
  } catch(e) { setStatus('Scan failed — tap catch to retry.'); }
}

/* ── BEST MATCH ── */
function bestMatch() {
  if (!overheadFlights.length) return null;
  let best = null, bestDist = Infinity;
  for (const ac of overheadFlights) {
    const flat = parseFloat(ac.lat), flon = parseFloat(ac.lon);
    if (isNaN(flat) || isNaN(flon)) continue;
    const icao = (ac.hex || '').toUpperCase();
    if (recentCatches[icao] && Date.now() - recentCatches[icao] < COOLDOWN_MS) continue;
    const d = Math.hypot(flat - userLat, flon - userLon);
    if (d < bestDist) { bestDist = d; best = ac; }
  }
  return best;
}

/* ── BUILD DATA ── */
function fmt(val, suffix) {
  const empty = val === null || val === undefined || val === '' || val === '0' || val === 0;
  return empty ? '—' : String(val) + (suffix || '');
}

function buildData(ac) {
  const callsign = (ac.flight || ac.r || 'UNKNOWN').trim();
  const type     = fmt(ac.t);
  const reg      = fmt(ac.r);
  const onGround = ac.gnd === '1' || ac.gnd === true || ac.alt_baro === 'ground';
  const altRaw   = ac.alt_baro;
  const alt      = altRaw && altRaw !== 'ground' ? parseInt(altRaw).toLocaleString() + ' ft' : (onGround ? 'On ground' : '—');
  const spd      = ac.gs ? Math.round(parseFloat(ac.gs)) + ' kts' : '—';
  const heading  = ac.track ? Math.round(parseFloat(ac.track)) + '°' : '—';
  const squawk   = fmt(ac.squawk);
  const origin   = fmt(ac.orig);
  const dest     = fmt(ac.dest);
  const operator = fmt(ac.ownOp || ac.op);
  const icao     = (ac.hex || '—').toUpperCase();
  const now      = new Date();
  return { callsign, type, reg, alt, spd, heading, squawk, origin, dest, operator, icao,
           time: now.toLocaleTimeString(), date: now.toLocaleDateString() };
}

/* ── CONFIDENCE ── */
function calcConfidence(d) {
  let score = 0, total = 0;
  if (d.type !== '—')     { score++; total++; }
  if (d.reg !== '—')      { score++; total++; }
  if (d.operator !== '—') { score++; total++; }
  if (d.alt !== '—')      { score++; total++; }
  if (total === 0) return { level: 'low', label: 'Low — minimal data returned' };
  const pct = score / total;
  if (pct >= 0.75) return { level: 'high',   label: 'High — good data match' };
  if (pct >= 0.5)  return { level: 'medium', label: 'Medium — partial data' };
  return               { level: 'low',    label: 'Low — minimal data returned' };
}

/* ── VERIFY TAB ── */
function renderVerifyTab() {
  const view = document.getElementById('verify-view');
  view.innerHTML = '';
  if (!pendingVerify) {
    view.innerHTML = `<div id="verify-empty">
      <svg width="48" height="48" fill="none" stroke="currentColor" stroke-width="1.2" viewBox="0 0 24 24">
        <path d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/>
      </svg>
      <span>Nothing to verify yet.<br>Catch a flight first.</span></div>`;
    return;
  }
  const d = pendingVerify;
  const conf = calcConfidence(d);
  const card = document.createElement('div');
  card.className = 'verify-card';
  card.innerHTML = `
    <div class="verify-callsign">${d.callsign}</div>
    <div class="verify-subtitle">${d.date} · ${d.time}</div>
    <div class="card-row"><span class="card-label">Aircraft type</span><span class="card-value">${d.type}</span></div>
    <div class="card-row"><span class="card-label">Registration</span><span class="card-value">${d.reg}</span></div>
    <div class="card-row"><span class="card-label">Operator</span><span class="card-value">${d.operator}</span></div>
    <div class="card-row"><span class="card-label">Origin</span><span class="card-value">${d.origin}</span></div>
    <div class="card-row"><span class="card-label">Destination</span><span class="card-value">${d.dest}</span></div>
    <div class="card-row"><span class="card-label">Altitude</span><span class="card-value">${d.alt}</span></div>
    <div class="card-row"><span class="card-label">Speed</span><span class="card-value">${d.spd}</span></div>
    <div class="card-row"><span class="card-label">Heading</span><span class="card-value">${d.heading}</span></div>
    <div class="card-row"><span class="card-label">Squawk</span><span class="card-value">${d.squawk}</span></div>
    <div class="card-row"><span class="card-label">ICAO 24</span><span class="card-value">${d.icao}</span></div>
  `;
  const confBar = document.createElement('div');
  confBar.className = 'confidence-bar';
  confBar.innerHTML = `<div class="conf-dot ${conf.level}"></div>
    <div class="conf-label"><strong>Confidence: ${conf.level.charAt(0).toUpperCase() + conf.level.slice(1)}</strong><br>${conf.label}</div>`;
  const actions = document.createElement('div');
  actions.className = 'verify-actions';
  const confirmBtn = document.createElement('button');
  confirmBtn.className = 'btn-confirm';
  confirmBtn.textContent = 'Confirm catch';
  confirmBtn.onclick = () => confirmCatch(d, conf.level);
  const dismissBtn = document.createElement('button');
  dismissBtn.className = 'btn-dismiss';
  dismissBtn.textContent = 'Dismiss';
  dismissBtn.onclick = () => dismissCatch();
  actions.appendChild(confirmBtn);
  actions.appendChild(dismissBtn);
  view.appendChild(card);
  view.appendChild(confBar);
  view.appendChild(actions);
}

function confirmCatch(d, confLevel) {
  const catches = loadCatches();
  catches.push({ ...d, confidence: confLevel });
  saveCatches(catches);
  pendingVerify = null;
  updateBadges();
  switchTab('log');
}

function dismissCatch() {
  pendingVerify = null;
  updateBadges();
  renderVerifyTab();
}

/* ── LOG TAB ── */
function renderLogTab() {
  const view = document.getElementById('log-view');
  view.innerHTML = '';
  const catches = loadCatches();
  if (!catches.length) {
    view.innerHTML = `<div id="log-empty">
      <svg width="48" height="48" fill="none" stroke="currentColor" stroke-width="1.2" viewBox="0 0 24 24">
        <path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/>
      </svg>
      <span>No confirmed catches yet.</span></div>`;
    return;
  }
  catches.slice().reverse().forEach(c => {
    const div = document.createElement('div');
    div.className = 'log-card';
    const conf = c.confidence || 'low';
    const meta = [c.type, c.reg, c.operator]
      .filter(v => v && v !== '—').join(' · ') || 'No data';
    const route = (c.origin !== '—' || c.dest !== '—')
      ? `${c.origin !== '—' ? c.origin : '?'} → ${c.dest !== '—' ? c.dest : '?'}` : '';
    div.innerHTML = `
      <div class="log-card-header">
        <span class="log-callsign">${c.callsign}</span>
        <span class="log-time">${c.date} ${c.time}</span>
      </div>
      <div class="log-meta">
        <span class="conf-pill ${conf}">${conf.toUpperCase()}</span>
        <span>${meta}</span>
        ${route ? '<span>' + route + '</span>' : ''}
        ${c.alt !== '—' ? '<span>' + c.alt + '</span>' : ''}
      </div>`;
    view.appendChild(div);
  });
  const clearBtn = document.createElement('button');
  clearBtn.id = 'log-clear-btn';
  clearBtn.textContent = 'Clear all catches';
  clearBtn.onclick = () => {
    if (confirm('Clear all catches? Cannot be undone.')) {
      localStorage.removeItem('spotter_catches');
      updateBadges();
      renderLogTab();
    }
  };
  view.appendChild(clearBtn);
}

/* ── CATCH BUTTON ── */
catchBtn.addEventListener('click', async () => {
  if (catching) return;
  if (!userLat) { setStatus('Waiting for GPS fix...'); return; }
  catching = true;
  setStatus('Catching...', 'yellow');
  if (!overheadFlights.length) await fetchFlights();
  const match = bestMatch();
  if (!match) {
    setStatus('No matchable aircraft — try again.');
  } else {
    const d = buildData(match);
    recentCatches[d.icao] = Date.now();
    catchBtn.classList.add('cooldown');
    setTimeout(() => catchBtn.classList.remove('cooldown'), COOLDOWN_MS);
    pendingVerify = d;
    updateBadges();
    setStatus('Caught ' + d.callsign + ' — go verify!', 'green');
    switchTab('verify');
  }
  catching = false;
});

catchBtn.addEventListener('keydown', e => { if (e.key === 'Enter' || e.key === ' ') catchBtn.click(); });

updateBadges();
</script>
</body>
</html>
